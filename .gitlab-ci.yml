image: node:20

stages:
  - verify
  - readiness

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

before_script:
  - npm ci

verify:
  stage: verify
  script:
    - npm run verify
    - npm run test:contract
    - npm run test:smoke:package
    - npm run test:smoke:host
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

readiness:
  stage: readiness
  script:
    - npm run test:readiness
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
